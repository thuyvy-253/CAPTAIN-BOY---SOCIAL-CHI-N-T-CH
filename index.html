<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN BOY - TINH HÀ CHIẾN TÍCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050b18; color: white; font-family: 'Be Vietnam Pro', sans-serif; background-image: radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 40px); }
        .galaxy-card { background: rgba(16, 25, 45, 0.9); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 20px; backdrop-filter: blur(10px); }
        .btn-action { background: #f1c40f; color: black; font-weight: 900; transition: 0.3s; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 12px; color: white; width: 100%; margin-bottom: 12px; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-yellow-400 mb-2 italic uppercase tracking-tighter">CAPTAIN BOY</h1>
            <p class="text-blue-300 text-[10px] tracking-[0.4em] font-bold mb-8 uppercase">✨ TINH HÀ CHIẾN TÍCH ✨</p>
            
            <!-- 2 BIỂU ĐỒ SONG SONG -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="galaxy-card p-6">
                    <p class="text-[10px] text-gray-400 uppercase mb-4 font-bold">Tỷ lệ bài đăng</p>
                    <canvas id="chartPlatforms"></canvas>
                </div>
                <div class="galaxy-card p-6">
                    <p class="text-[10px] text-gray-400 uppercase mb-4 font-bold">Tiến độ CMT (Thực tế vs Kỳ vọng)</p>
                    <canvas id="chartKPI"></canvas>
                </div>
            </div>
        </header>

        <div class="max-w-2xl mx-auto">
            <!-- FORM BÁO CÁO -->
            <div class="galaxy-card p-6 mb-12 border-t-4 border-blue-500 shadow-2xl">
                <h2 class="text-xl font-black text-center mb-6 uppercase tracking-widest text-blue-400">🚀 NỘP CHIẾN TÍCH</h2>
                <div id="report-box">
                    <input type="text" id="name" placeholder="Tên Cừu (VD: Cừu Leo Top)">
                    <input type="text" id="account" placeholder="Link hoặc Tên Acc đã cmt">
                    <input type="number" id="quantity" placeholder="Số lượng cmt đã thực hiện">
                    <button onclick="sendReport()" id="btn-send" class="w-full bg-blue-600 font-black py-4 rounded-xl mt-2 uppercase tracking-widest text-white">GỬI CHIẾN TÍCH</button>
                </div>
                <div id="success-msg" class="hidden text-center py-4 text-green-400 font-bold">✨ ĐÃ GHI NHẬN! ✨</div>
            </div>

            <!-- BỘ LỌC -->
            <div class="flex justify-center gap-2 mb-8 overflow-x-auto pb-2">
                <button onclick="filter('All')" class="px-5 py-2 rounded-full bg-blue-900 border border-blue-500 text-xs font-bold">Tất cả</button>
                <button onclick="filter('Facebook')" class="px-5 py-2 rounded-full bg-blue-600 text-xs font-bold">Facebook</button>
                <button onclick="filter('TikTok')" class="px-5 py-2 rounded-full bg-pink-600 text-xs font-bold">TikTok</button>
                <button onclick="filter('Threads')" class="px-5 py-2 rounded-full bg-black border border-gray-600 text-xs font-bold">Threads</button>
            </div>

            <div id="post-list" class="space-y-8"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "THAY_LINK_SCRIPT_CUA_BAN_TAI_DAY";
        let allPosts = [];
        let chart1, chart2;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                allPosts = data.posts;
                updateCharts(data.stats);
                render(allPosts);
            } catch (e) { document.getElementById('post-list').innerHTML = "Lỗi kết nối!"; }
        }

        function updateCharts(stats) {
            // Biểu đồ 1: Số bài đăng (Tròn)
            const ctx1 = document.getElementById('chartPlatforms').getContext('2d');
            if(chart1) chart1.destroy();
            chart1 = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Facebook', 'TikTok', 'Threads'],
                    datasets: [{
                        data: [stats.fb, stats.tt, stats.th],
                        backgroundColor: ['#2563eb', '#db2777', '#ffffff'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } }
            });

            // Biểu đồ 2: So sánh KPI (Cột)
            const ctx2 = document.getElementById('chartKPI').getContext('2d');
            if(chart2) chart2.destroy();
            chart2 = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['CMT Kỳ vọng', 'CMT Thực tế'],
                    datasets: [{
                        label: 'Số lượng',
                        data: [stats.expected, stats.actual],
                        backgroundColor: ['#374151', '#f1c40f'], // Xám và Vàng
                        borderRadius: 10
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'white' } },
                        x: { ticks: { color: 'white' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function render(data) {
            const list = document.getElementById('post-list');
            list.innerHTML = data.map(item => `
                <div class="galaxy-card p-6 border-l-4 ${item.status === 'Đang chạy' ? 'border-l-yellow-400' : 'border-l-blue-900'}">
                    <div class="flex justify-between items-center mb-4 uppercase font-bold text-[10px]">
                        <span class="text-blue-400">${item.platform}</span>
                        <span class="${item.status === 'Đang chạy' ? 'text-yellow-400 animate-pulse' : 'text-gray-500'} italic">${item.status}</span>
                    </div>
                    <h3 class="text-2xl font-black mb-2 text-white leading-tight uppercase italic">${item.goal}</h3>
                    <p class="text-gray-400 text-[10px] mb-6 uppercase tracking-widest leading-relaxed font-bold">Key: ${item.keywords}</p>
                    <div class="grid grid-cols-2 gap-3">
                        <a href="${item.link}" target="_blank" class="btn-action py-4 rounded-xl text-center text-xs uppercase shadow-lg">CHIẾN NGAY</a>
                        <a href="${item.content}" target="_blank" class="bg-white/10 text-white font-bold py-4 rounded-xl text-center text-xs uppercase border border-white/20">LẤY VĂN MẪU</a>
                    </div>
                </div>
            `).join('');
        }

        function filter(p) { render(p === 'All' ? allPosts : allPosts.filter(x => x.platform === p)); }

        async function sendReport() {
            const name = document.getElementById('name').value;
            const account = document.getElementById('account').value;
            const quantity = document.getElementById('quantity').value;
            const btn = document.getElementById('btn-send');
            if(!name || !quantity) return alert("Điền đủ tên và số lượng nhé!");
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, account, quantity }) });
            document.getElementById('report-box').classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
