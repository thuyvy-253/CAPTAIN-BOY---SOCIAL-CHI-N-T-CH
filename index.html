<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN BOY - TINH HÀ CHIẾN TÍCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #050b18;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            color: white;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .galaxy-card {
            background: rgba(16, 25, 45, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
        }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px; color: white; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-yellow-400 mb-2 tracking-tighter italic uppercase">CAPTAIN BOY</h1>
            <p class="text-blue-300 text-sm tracking-widest">✨ TINH HÀ CHIẾN TÍCH ✨</p>
        </header>

        <!-- Form Báo Cáo Chiến Tích -->
        <div class="galaxy-card p-6 mb-10 border-2 border-blue-500/50">
            <h2 class="text-xl font-bold text-center mb-4 text-blue-400 uppercase">🚀 BÁO CÁO CHIẾN TÍCH</h2>
            <div id="report-form">
                <input type="text" id="name" placeholder="Tên Cừu (VD: Cừu Vui Vẻ)">
                <input type="text" id="account" placeholder="Link hoặc Tên Acc đã cmt">
                <input type="number" id="quantity" placeholder="Số lượng cmt đã thực hiện">
                <button onclick="sendReport()" id="btn-send" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-3 rounded-lg transition-all">NỘP CHIẾN TÍCH</button>
            </div>
            <p id="msg" class="text-center mt-3 hidden text-green-400 font-bold">✨ Đã ghi nhận chiến tích! ✨</p>
        </div>

        <!-- Danh sách bài đăng -->
        <div id="content" class="space-y-6">
            <p class="text-center">Đang triệu hồi các chú Cừu...</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "THAY_LINK_APPS_SCRIPT_MOI_CUA_BAN_VAO_DAY";

        async function fetchData() {
            const response = await fetch(SCRIPT_URL);
            const posts = await response.json();
            render(posts);
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = data.map(item => `
                <div class="galaxy-card p-6 border-l-4 ${item.status === 'Đang chạy' ? 'border-l-yellow-400' : 'border-l-blue-500'}">
                    <div class="flex justify-between items-center mb-3 text-[10px] font-bold uppercase">
                        <span class="text-blue-400">${item.platform}</span>
                        <span class="${item.status === 'Đang chạy' ? 'text-yellow-400' : 'text-gray-500'} italic">${item.status}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2">${item.goal}</h3>
                    <p class="text-gray-400 text-xs mb-4">Key: ${item.keywords}</p>
                    <div class="grid grid-cols-2 gap-2">
                        <a href="${item.link}" target="_blank" class="bg-yellow-500 text-black font-bold py-3 rounded-lg text-center text-sm">CHIẾN NGAY</a>
                        <a href="${item.content}" target="_blank" class="bg-white/10 py-3 rounded-lg text-center text-sm">LẤY VĂN MẪU</a>
                    </div>
                </div>
            `).join('');
        }

        async function sendReport() {
            const name = document.getElementById('name').value;
            const account = document.getElementById('account').value;
            const quantity = document.getElementById('quantity').value;
            const btn = document.getElementById('btn-send');

            if(!name || !quantity) return alert("Cừu ơi điền đủ tên và số lượng nhé!");

            btn.innerText = "ĐANG GỬI...";
            btn.disabled = true;

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Rất quan trọng để không bị lỗi bảo mật
                cache: 'no-cache',
                body: JSON.stringify({ name, account, quantity })
            });

            document.getElementById('report-form').classList.add('hidden');
            document.getElementById('msg').classList.remove('hidden');
        }

        fetchData();
    </script>
</body>
</html>
