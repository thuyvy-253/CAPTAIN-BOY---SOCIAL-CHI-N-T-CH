<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN BOY - SOCIAL CHIẾN TÍCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #050b18;
            --accent-blue: #1e40af;
            --accent-yellow: #eab308;
        }

        body {
            margin: 0;
            padding: 0;
            color: white;
            font-family: 'Be Vietnam Pro', sans-serif;
            /* Nền gradient chuyển động xanh - vàng */
            background: linear-gradient(125deg, #050b18, #0a192f, #1e3a8a, #422006, #050b18);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hiệu ứng Canvas nền */
        #galaxy-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .galaxy-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(234, 179, 8, 0.2); /* Viền vàng nhẹ */
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }
        
        .galaxy-card:hover {
            border-color: rgba(234, 179, 8, 0.5);
            transform: translateY(-5px);
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s;
        }
        
        input:focus {
            border-color: #eab308;
            background: rgba(234, 179, 8, 0.05);
        }

        /* Nút bấm hiệu ứng phát sáng */
        .btn-glow-yellow {
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
        }
        .btn-glow-blue {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Canvas tạo sao bay -->
    <canvas id="galaxy-canvas"></canvas>

    <div class="max-w-4xl mx-auto relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-6xl font-black text-yellow-400 mb-2 italic uppercase tracking-tighter drop-shadow-[0_0_15px_rgba(234,179,8,0.6)]">
                CAPTAIN BOY
            </h1>
            <p class="text-blue-300 text-[10px] tracking-[0.5em] font-bold mb-8 uppercase opacity-80">
                ✨ TINH HÀ CHIẾN TÍCH ✨
            </p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="galaxy-card p-6 border-t-2 border-blue-500">
                    <p class="text-[10px] text-gray-400 uppercase mb-4 font-bold tracking-widest">Phân bổ nền tảng</p>
                    <canvas id="chartPlatforms"></canvas>
                </div>
                <div class="galaxy-card p-6 border-t-2 border-yellow-500">
                    <p class="text-[10px] text-gray-400 uppercase mb-4 font-bold tracking-widest">Tiến độ mục tiêu</p>
                    <canvas id="chartKPI"></canvas>
                </div>
            </div>
        </header>

        <div class="max-w-2xl mx-auto">
            <!-- Form nộp -->
            <div class="galaxy-card p-8 mb-12 border-b-4 border-yellow-500 shadow-2xl">
                <h2 class="text-xl font-black mb-6 uppercase tracking-[0.2em] text-yellow-400 flex items-center justify-center">
                    <span class="mr-2">🚀</span> NỘP CHIẾN TÍCH
                </h2>
                <div id="report-box">
                    <input type="text" id="name" placeholder="Tên Cừu (VD: Cừu Leo Top)">
                    <input type="text" id="account" placeholder="Link hoặc Tên Acc đã cmt">
                    <input type="number" id="quantity" placeholder="Số lượng cmt đã thực hiện">
                    <button onclick="sendReport()" id="btn-send" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl mt-4 uppercase transition-all btn-glow-yellow">GỬI CHIẾN TÍCH NGAY</button>
                </div>
                <div id="success-msg" class="hidden text-yellow-400 font-bold py-4 text-center animate-bounce">
                    ✨ ĐÃ GHI NHẬN VÀO TINH HÀ! ✨
                </div>
            </div>

            <!-- Filter -->
            <div class="flex justify-center gap-2 mb-8 overflow-x-auto pb-2 px-2">
                <button onclick="filter('All')" class="px-6 py-2 rounded-full bg-white/10 border border-white/20 text-xs font-bold hover:bg-white/20 transition">Tất cả</button>
                <button onclick="filter('Facebook')" class="px-6 py-2 rounded-full bg-blue-600 text-xs font-bold btn-glow-blue">Facebook</button>
                <button onclick="filter('TikTok')" class="px-6 py-2 rounded-full bg-pink-600 text-xs font-bold">TikTok</button>
                <button onclick="filter('Threads')" class="px-6 py-2 rounded-full bg-black border border-gray-600 text-xs font-bold">Threads</button>
            </div>

            <div id="post-list" class="space-y-8"></div>
        </div>

        <footer class="text-center py-20 mt-10 border-t border-white/10 font-bold text-gray-500 text-xs tracking-widest">
            @NHUNGCONBOTCUACAPTAINBOY <br>
            <span class="text-[8px] opacity-50 uppercase">Powered by Galaxy Engine</span>
        </footer>
    </div>

    <script>
        // --- HIỆU ỨNG GALAXY CANVAS ---
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1,
                    color: Math.random() > 0.5 ? '#eab308' : '#3b82f6'
                });
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if (p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animateCanvas);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animateCanvas();

        // --- LOGIC XỬ LÝ DỮ LIỆU (Giữ nguyên từ code cũ của bạn) ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzyWLw1F-pGhjOU_-8kyvIfzOAJWtNYUCLaahwCP07dF41XPur26lzlY_ML1Vopdn9/exec";
        let allPosts = [];
        let chart1, chart2;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                allPosts = data.posts;
                updateCharts(data.stats);
                render(allPosts);
            } catch (e) { 
                document.getElementById('post-list').innerHTML = "<p class='text-center text-red-400'>Lỗi kết nối Tinh Hà!</p>"; 
            }
        }

        function updateCharts(stats) {
            const ctx1 = document.getElementById('chartPlatforms').getContext('2d');
            if(chart1) chart1.destroy();
            chart1 = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Facebook', 'TikTok', 'Threads'],
                    datasets: [{
                        data: [stats.fb, stats.tt, stats.th],
                        backgroundColor: ['#2563eb', '#db2777', '#facc15'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } } }
            });

            const ctx2 = document.getElementById('chartKPI').getContext('2d');
            if(chart2) chart2.destroy();
            chart2 = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['Kỳ vọng', 'Thực tế'],
                    datasets: [{
                        label: 'Số lượng CMT',
                        data: [stats.expected, stats.actual],
                        backgroundColor: ['#334155', '#eab308'],
                        borderRadius: 8
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function render(data) {
            const list = document.getElementById('post-list');
            if(!data || data.length === 0) { list.innerHTML = "<p class='text-center'>Chưa có tín hiệu mới từ vũ trụ!</p>"; return; }
            list.innerHTML = data.map(item => `
                <div class="galaxy-card p-6 border-l-4 ${item.status === 'Đang chạy' ? 'border-l-yellow-400' : 'border-l-blue-900'}">
                    <div class="flex justify-between items-center mb-4 uppercase font-bold text-[10px]">
                        <span class="text-blue-400 tracking-widest">${item.platform}</span>
                        <span class="${item.status === 'Đang chạy' ? 'text-yellow-400 animate-pulse' : 'text-gray-500'} italic">${item.status}</span>
                    </div>
                    <h3 class="text-2xl font-black mb-2 text-white italic uppercase leading-tight">${item.goal}</h3>
                    <p class="text-gray-400 text-[10px] mb-6 uppercase tracking-widest font-bold">Key: ${item.keywords}</p>
                    <div class="grid grid-cols-2 gap-4">
                        <a href="${item.link}" target="_blank" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl text-center text-xs uppercase transition-all transform hover:scale-105 shadow-lg shadow-yellow-500/20">CHIẾN NGAY</a>
                        <a href="${item.content}" target="_blank" class="bg-white/5 hover:bg-white/10 text-white font-bold py-4 rounded-xl text-center text-xs uppercase border border-white/10 transition-all">LẤY VĂN MẪU</a>
                    </div>
                </div>
            `).join('');
        }

        function filter(p) { render(p === 'All' ? allPosts : allPosts.filter(x => x.platform === p)); }

        async function sendReport() {
            const name = document.getElementById('name').value;
            const account = document.getElementById('account').value;
            const quantity = document.getElementById('quantity').value;
            const btn = document.getElementById('btn-send');
            if(!name || !quantity) return alert("Điền đủ tên và số lượng nhé Cừu ơi!");
            
            btn.innerText = "ĐANG TRUYỀN TÍN HIỆU..."; 
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, account, quantity }) });
                document.getElementById('report-box').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (e) {
                alert("Lỗi khi gửi, thử lại nhé!");
                btn.innerText = "GỬI CHIẾN TÍCH";
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
