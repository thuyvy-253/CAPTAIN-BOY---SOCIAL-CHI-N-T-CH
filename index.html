<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN BOY - SOCIAL CHIẾN TÍCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0; color: white; font-family: 'Be Vietnam Pro', sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0a192f 50%, #050b18 100%);
            min-height: 100vh; overflow-x: hidden;
        }
        /* Hiệu ứng Neon cho Header */
        .neon-text {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.8), 0 0 20px rgba(251, 191, 36, 0.4);
            letter-spacing: -2px;
        }
        /* Card hiệu ứng Glassmorphism */
        .galaxy-card {
            background: rgba(16, 25, 45, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        .galaxy-card:hover { border-color: rgba(251, 191, 36, 0.3); transform: translateY(-3px); }
        
        /* Hiệu ứng chạy chữ cho lời nhắn */
        .marquee-container { overflow: hidden; white-space: nowrap; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); }
        .marquee-text { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .btn-primary { background: linear-gradient(to right, #f59e0b, #fbbf24); color: black; font-weight: 900; }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); color: white; }

        input { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: #fbbf24 !important; background: rgba(255, 255, 255, 0.08) !important; }

        .tab-btn { transition: 0.3s; position: relative; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -5px; left: 20%; right: 20%; height: 3px; background: #fbbf24; border-radius: 10px; box-shadow: 0 0 10px #fbbf24; }

        #music-control { position: fixed; bottom: 20px; right: 20px; z-index: 100; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        #music-control:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <div id="music-control" onclick="toggleMusic()" class="bg-black/50 p-3 rounded-full border border-yellow-500/50"><span id="music-icon">🔇</span></div>

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <header class="text-center mb-10">
            <h1 class="text-6xl md:text-7xl font-black italic uppercase neon-text mb-2">CAPTAIN BOY</h1>
            <p class="text-blue-400 text-[10px] tracking-[0.6em] font-bold uppercase mb-6">Social Chiến Tích Ecosystem</p>
            
            <div id="main-announcement" class="hidden max-w-2xl mx-auto marquee-container py-2 rounded-full mb-8">
                <p id="announcement-text" class="marquee-text text-yellow-400 font-bold italic text-xs uppercase"></p>
            </div>

            <!-- DASHBOARD CHARTS -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto mb-12">
                <div class="galaxy-card p-6">
                    <h4 class="text-[10px] text-gray-500 font-bold uppercase mb-4 tracking-widest text-left">Nền tảng hoạt động</h4>
                    <div class="h-[150px]"><canvas id="chartPlatforms"></canvas></div>
                </div>
                <div class="galaxy-card p-6">
                    <h4 class="text-[10px] text-gray-500 font-bold uppercase mb-4 tracking-widest text-left">Tiến độ mục tiêu (KPI)</h4>
                    <div class="h-[150px]"><canvas id="chartKPI"></canvas></div>
                </div>
            </div>
        </header>

        <!-- FORM NỘP CHIẾN TÍCH (COMPACT DESIGN) -->
        <div class="galaxy-card p-6 mb-12 max-w-4xl mx-auto border-t-4 border-yellow-500">
            <div class="flex items-center gap-2 mb-5 justify-center">
                <span class="text-yellow-500">🚀</span>
                <h2 class="text-sm font-black uppercase tracking-widest text-yellow-500">Nộp chiến tích mới</h2>
            </div>
            <div id="report-box" class="flex flex-col md:flex-row gap-3">
                <input type="text" id="name" placeholder="Tên acc Cừu của bạn" class="flex-[1.5] py-3 px-4 text-sm">
                <input type="text" id="account" placeholder="Tên bài viết đã CMT" class="flex-[1.5] py-3 px-4 text-sm">
                <input type="number" id="quantity" placeholder="Số lượng" class="w-full md:w-32 py-3 px-4 text-sm text-center">
                <button onclick="sendReport()" id="btn-send" class="btn-primary px-10 py-3 rounded-lg text-xs uppercase transition-all shadow-lg shadow-yellow-500/20">Gửi ngay</button>
            </div>
            <div id="success-msg" class="hidden text-center text-yellow-400 font-bold text-xs mt-4 animate-bounce">✨ ĐÃ GHI NHẬN THÀNH CÔNG VÀO VŨ TRỤ! ✨</div>
        </div>

        <!-- TAB NAVIGATION -->
        <div class="flex justify-center gap-10 mb-10 border-b border-white/5 pb-2">
            <button id="btn-running" onclick="switchTab('Đang chạy')" class="tab-btn active text-yellow-500 font-black text-xs uppercase tracking-widest px-4 py-2">🔥 Đang chạy</button>
            <button id="btn-completed" onclick="switchTab('Hoàn thành')" class="tab-btn text-gray-500 font-black text-xs uppercase tracking-widest px-4 py-2 hover:text-white">✅ Hoàn thành</button>
        </div>

        <!-- POST LISTINGS -->
        <div id="container-running" class="max-w-6xl mx-auto">
            <div id="list-running" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
        <div id="container-completed" class="max-w-6xl mx-auto hidden">
            <div id="list-completed" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <footer class="text-center py-20 mt-20 border-t border-white/5 opacity-30 text-[8px] font-bold tracking-[0.5em]">
            DESIGNED FOR CAPTAIN BOY WARRIORS • @NHUNGCONBOTCUACAPTAINBOY
        </footer>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const musicIcon = document.getElementById('music-icon');
        function toggleMusic() { if (music.paused) { music.play(); musicIcon.innerText = "🔊"; } else { music.pause(); musicIcon.innerText = "🔇"; } }
    
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIvrpOfMGO5ryIiQ0uX6c-CLT0CA_2p63ajv6BfjU0_XvkY8o4niOiXKQ7b4UAMPI/exec";
        let allPosts = []; let chart1, chart2;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.note) {
                    document.getElementById('announcement-text').innerText = data.note + " • " + data.note + " • " + data.note;
                    document.getElementById('main-announcement').classList.remove('hidden');
                }
                allPosts = data.posts;
                updateCharts(data.stats);
                renderLists(allPosts);
            } catch (e) { console.error(e); }
        }

        function updateCharts(stats) {
            const ctx1 = document.getElementById('chartPlatforms').getContext('2d');
            if(chart1) chart1.destroy();
            chart1 = new Chart(ctx1, { type: 'doughnut', data: { labels: ['FB', 'TT', 'TH'], datasets: [{ data: [stats.fb, stats.tt, stats.th], backgroundColor: ['#3b82f6', '#ec4899', '#fbbf24'], borderWidth: 0, hoverOffset: 10 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: {size: 10, weight: 'bold'} } } } } });

            const ctx2 = document.getElementById('chartKPI').getContext('2d');
            if(chart2) chart2.destroy();
            chart2 = new Chart(ctx2, { type: 'bar', data: { labels: ['Kỳ vọng', 'Thực tế'], datasets: [{ data: [stats.expected, stats.actual], backgroundColor: ['#1e293b', '#fbbf24'], borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { ticks: { color: '#94a3b8', font: {size: 10, weight: 'bold'} } } }, plugins: { legend: { display: false } } } });
        }

        function renderLists(data) {
            const listRunning = document.getElementById('list-running');
            const listCompleted = document.getElementById('list-completed');

            const createCardHTML = (item) => {
                const hasLink = item.content && item.content.toString().startsWith("http");
                const templateBtn = hasLink 
                    ? `<a href="${item.content}" target="_blank" class="btn-secondary py-3 px-2 rounded-lg text-center text-[10px] font-black tracking-widest uppercase transition-all">Văn Mẫu</a>`
                    : `<div class="bg-white/5 text-gray-600 font-bold py-3 px-2 rounded-lg text-center text-[9px] uppercase border border-white/5 opacity-50">Không mẫu</div>`;
                
                const isRunning = item.status.trim() === 'Đang chạy';

                return `<div class="galaxy-card p-5 flex flex-col justify-between min-h-[170px] border-l-4 ${isRunning ? 'border-l-yellow-500' : 'border-l-blue-900'}">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-blue-400 font-black text-[9px] uppercase tracking-tighter bg-blue-500/10 px-2 py-0.5 rounded">${item.platform}</span>
                            <span class="${isRunning ? 'text-yellow-500 animate-pulse' : 'text-gray-600'} italic font-bold text-[8px] uppercase tracking-widest">${item.status}</span>
                        </div>
                        <h3 class="text-sm font-black mb-1 text-white leading-tight uppercase line-clamp-2">${item.goal}</h3>
                        <p class="text-gray-500 text-[8px] font-bold mb-4 uppercase truncate tracking-widest">Key: ${item.keywords}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <a href="${item.link}" target="_blank" class="btn-primary py-3 px-2 rounded-lg text-center text-[10px] uppercase shadow-sm">Chiến Ngay</a>
                        ${templateBtn}
                    </div>
                </div>`;
            };

            const runningPosts = data.filter(x => x.status.trim() === 'Đang chạy');
            const completedPosts = data.filter(x => x.status.trim() === 'Hoàn thành');

            listRunning.innerHTML = runningPosts.length > 0 ? runningPosts.map(createCardHTML).join('') : '<p class="col-span-full text-center text-gray-600 italic text-xs py-10">Vũ trụ đang nghỉ ngơi, chưa có bài mới...</p>';
            listCompleted.innerHTML = completedPosts.length > 0 ? completedPosts.map(createCardHTML).join('') : '<p class="col-span-full text-center text-gray-600 italic text-xs py-10">Chưa có bài nào hoàn thành...</p>';
        }
        
        function switchTab(type) {
            const btnRunning = document.getElementById('btn-running');
            const btnCompleted = document.getElementById('btn-completed');
            const conRunning = document.getElementById('container-running');
            const conCompleted = document.getElementById('container-completed');

            if(type === 'Đang chạy') {
                btnRunning.className = "tab-btn active text-yellow-500 font-black text-xs uppercase tracking-widest px-4 py-2";
                btnCompleted.className = "tab-btn text-gray-500 font-black text-xs uppercase tracking-widest px-4 py-2 hover:text-white";
                conRunning.classList.remove('hidden'); conCompleted.classList.add('hidden');
            } else {
                btnCompleted.className = "tab-btn active text-blue-500 font-black text-xs uppercase tracking-widest px-4 py-2";
                btnRunning.className = "tab-btn text-gray-500 font-black text-xs uppercase tracking-widest px-4 py-2 hover:text-white";
                conCompleted.classList.remove('hidden'); conRunning.classList.add('hidden');
            }
        }

        async function sendReport() {
            const name = document.getElementById('name').value;
            const account = document.getElementById('account').value;
            const quantity = document.getElementById('quantity').value;
            const btn = document.getElementById('btn-send');
            if (!name || !account || !quantity) return alert("Cừu ơi điền đủ giúp mình nha!");
            btn.innerText = "..."; btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, account, quantity }) });
                document.getElementById('report-box').style.opacity = "0.2";
                document.getElementById('success-msg').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('report-box').style.opacity = "1";
                    document.getElementById('success-msg').classList.add('hidden');
                    btn.innerText = "GỬI NGAY"; btn.disabled = false;
                    document.getElementById('name').value = ""; document.getElementById('account').value = ""; document.getElementById('quantity').value = "";
                }, 3000);
            } catch (e) { alert("Lỗi rồi!"); btn.disabled = false; }
        }
        init();
    </script>
</body>
</html>
