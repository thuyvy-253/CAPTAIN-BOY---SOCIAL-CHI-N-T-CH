<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN BOY - SOCIAL CHIẾN TÍCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0; padding: 0; color: white;
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #050b18, #0a192f, #1e3a8a, #422006, #050b18) !important;
            background-size: 400% 400% !important;
            animation: galaxyMove 15s ease infinite !important;
            overflow-x: hidden; position: relative;
        }
        @keyframes galaxyMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .galaxy-card { background: rgba(16, 25, 45, 0.85); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 12px; backdrop-filter: blur(10px); transition: 0.3s; }
        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 8px; padding: 8px 12px; color: white; width: 100%; outline: none; font-size: 13px; }
        input:focus { border-color: #eab308 !important; }
        .btn-filter { transition: all 0.3s ease; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .active-running { background: #eab308 !important; color: black !important; font-weight: 900; box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .active-completed { background: #1e40af !important; color: white !important; font-weight: 900; box-shadow: 0 0 15px rgba(30, 64, 175, 0.3); }
        .tab-inactive { opacity: 0.4; background: rgba(255,255,255,0.05); }
        #music-control { position: fixed; bottom: 15px; right: 15px; z-index: 100; width: 35px; height: 35px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid #eab308; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <div id="music-control" onclick="toggleMusic()"><span id="music-icon" style="font-size: 16px;">🔇</span></div>

    <div class="max-w-6xl mx-auto relative z-10">
        <header class="text-center mb-6">
            <h1 class="text-5xl md:text-6xl font-black text-yellow-400 mb-1 italic uppercase tracking-tighter" style="text-shadow: 0 0 15px rgba(234, 179, 8, 0.6);">CAPTAIN BOY</h1>
            <p class="text-blue-300 text-[10px] tracking-[0.5em] font-bold mb-6 uppercase">✨ SOCIAL CHIẾN TÍCH ✨</p>
            
            <div id="main-announcement" class="hidden mb-6">
                <div class="galaxy-card p-3 border border-yellow-500/30 bg-yellow-500/5 inline-block px-10">
                    <p id="announcement-text" class="text-yellow-400 font-bold italic text-xs"></p>
                </div>
            </div>

            <!-- BIỂU ĐỒ - NẰM NGANG NHAU -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto mb-8">
                <div class="galaxy-card p-4">
                    <p class="text-[9px] text-gray-400 uppercase mb-2 font-bold">Nền tảng hoạt động</p>
                    <div class="h-[120px]"><canvas id="chartPlatforms"></canvas></div>
                </div>
                <div class="galaxy-card p-4">
                    <p class="text-[9px] text-gray-400 uppercase mb-2 font-bold">Tiến độ KPI (CMT)</p>
                    <div class="h-[120px]"><canvas id="chartKPI"></canvas></div>
                </div>
            </div>
        </header>

        <!-- FORM NỘP CHIẾN TÍCH - GỌN TRÊN 1 HÀNG (MÁY TÍNH) -->
        <div class="galaxy-card p-5 mb-10 border-t-2 border-yellow-500 max-w-4xl mx-auto">
            <h2 class="text-center text-xs font-black mb-4 uppercase tracking-widest text-yellow-400">🚀 NỘP CHIẾN TÍCH</h2>
            <div id="report-box" class="flex flex-col md:flex-row gap-3">
                <input type="text" id="name" placeholder="Tên acc Cừu" class="flex-1">
                <input type="text" id="account" placeholder="Tên bài cmt" class="flex-1">
                <input type="number" id="quantity" placeholder="Số lượng" class="w-full md:w-24">
                <button onclick="sendReport()" id="btn-send" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black px-6 py-2 rounded text-[11px] uppercase transition-all whitespace-nowrap">GỬI</button>
            </div>
            <div id="success-msg" class="hidden text-center text-yellow-400 font-bold text-xs mt-3">✨ ĐÃ GHI NHẬN THÀNH CÔNG! ✨</div>
        </div>

        <!-- NÚT CHỌN TRẠNG THÁI (CHỈ CÓ 2 NÚT) -->
        <div class="flex justify-center gap-4 mb-8">
            <button id="btn-running" onclick="switchTab('Đang chạy')" class="btn-filter active-running px-10 py-2.5 rounded-full text-[11px] uppercase tracking-widest">🔥 ĐANG CHẠY</button>
            <button id="btn-completed" onclick="switchTab('Hoàn thành')" class="btn-filter tab-inactive px-10 py-2.5 rounded-full text-[11px] uppercase tracking-widest">✅ HOÀN THÀNH</button>
        </div>

        <!-- DANH SÁCH - LUÔN LÀ GRID 2 CỘT TRÊN MÁY TÍNH -->
        <div id="container-running" class="max-w-5xl mx-auto">
            <div id="list-running" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="container-completed" class="max-w-5xl mx-auto hidden">
            <div id="list-completed" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <footer class="text-center py-12 mt-10 border-t border-white/5 font-bold opacity-30 text-[8px]">@NHUNGCONBOTCUACAPTAINBOY</footer>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const musicIcon = document.getElementById('music-icon');
        function toggleMusic() { if (music.paused) { music.play(); musicIcon.innerText = "🔊"; } else { music.pause(); musicIcon.innerText = "🔇"; } }
    
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIvrpOfMGO5ryIiQ0uX6c-CLT0CA_2p63ajv6BfjU0_XvkY8o4niOiXKQ7b4UAMPI/exec";
        
        let allPosts = [];
        let chart1, chart2;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.note) {
                    document.getElementById('announcement-text').innerText = "📢 " + data.note;
                    document.getElementById('main-announcement').classList.remove('hidden');
                }
                allPosts = data.posts;
                updateCharts(data.stats);
                renderLists(allPosts);
            } catch (e) { console.error(e); }
        }

        function updateCharts(stats) {
            const ctx1 = document.getElementById('chartPlatforms').getContext('2d');
            if(chart1) chart1.destroy();
            chart1 = new Chart(ctx1, { type: 'doughnut', data: { labels: ['FB', 'TT', 'TH'], datasets: [{ data: [stats.fb, stats.tt, stats.th], backgroundColor: ['#2563eb', '#db2777', '#facc15'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: 'white', font: {size: 9} } } } } });

            const ctx2 = document.getElementById('chartKPI').getContext('2d');
            if(chart2) chart2.destroy();
            chart2 = new Chart(ctx2, { type: 'bar', data: { labels: ['Kỳ vọng', 'Thực tế'], datasets: [{ data: [stats.expected, stats.actual], backgroundColor: ['#334155', '#eab308'], borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { ticks: { color: 'white', font: {size: 9} } } }, plugins: { legend: { display: false } } } });
        }

        function renderLists(data) {
            const listRunning = document.getElementById('list-running');
            const listCompleted = document.getElementById('list-completed');

            const createCardHTML = (item) => {
                const hasLink = item.content && item.content.toString().startsWith("http");
                const templateBtn = hasLink 
                    ? `<a href="${item.content}" target="_blank" class="bg-white/10 text-white font-bold py-2 rounded text-[10px] text-center border border-white/20 hover:bg-white/20 transition-all">VĂN MẪU</a>`
                    : `<div class="bg-gray-800/40 text-gray-600 font-bold py-2 rounded text-[9px] text-center border border-gray-800/50">KHÔNG VĂN MẪU</div>`;
                
                const isRunning = item.status.trim() === 'Đang chạy';

                return `<div class="galaxy-card p-4 border-l-4 ${isRunning ? 'border-l-yellow-400' : 'border-l-blue-700'} flex flex-col justify-between min-h-[150px]">
                    <div>
                        <div class="flex justify-between items-center mb-2 uppercase font-bold text-[8px]">
                            <span class="text-blue-400">${item.platform}</span>
                            <span class="${isRunning ? 'text-yellow-400 animate-pulse' : 'text-gray-500'} italic">${item.status}</span>
                        </div>
                        <h3 class="text-[13px] font-black mb-1 text-white leading-snug uppercase line-clamp-2">${item.goal}</h3>
                        <p class="text-gray-500 text-[8px] mb-3 uppercase truncate opacity-70">Key: ${item.keywords}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-auto">
                        <a href="${item.link}" target="_blank" class="bg-yellow-500 text-black font-black py-2 rounded text-[10px] text-center hover:opacity-80 transition-all">CHIẾN NGAY</a>
                        ${templateBtn}
                    </div>
                </div>`;
            };

            const runningPosts = data.filter(x => x.status.trim() === 'Đang chạy');
            const completedPosts = data.filter(x => x.status.trim() === 'Hoàn thành');

            listRunning.innerHTML = runningPosts.length > 0 ? runningPosts.map(createCardHTML).join('') : '<p class="col-span-full text-center text-gray-600 italic text-xs py-10">Hiện chưa có bài đang chạy...</p>';
            listCompleted.innerHTML = completedPosts.length > 0 ? completedPosts.map(createCardHTML).join('') : '<p class="col-span-full text-center text-gray-600 italic text-xs py-10">Hiện chưa có bài hoàn thành...</p>';
        }
        
        function switchTab(type) {
            const btnRunning = document.getElementById('btn-running');
            const btnCompleted = document.getElementById('btn-completed');
            const conRunning = document.getElementById('container-running');
            const conCompleted = document.getElementById('container-completed');

            if(type === 'Đang chạy') {
                btnRunning.className = "btn-filter active-running px-10 py-2.5 rounded-full text-[11px] uppercase tracking-widest";
                btnCompleted.className = "btn-filter tab-inactive px-10 py-2.5 rounded-full text-[11px] uppercase tracking-widest";
                conRunning.classList.remove('hidden');
                conCompleted.classList.add('hidden');
            } else {
                btnCompleted.className = "btn-filter active-completed px-10 py-2.5 rounded-full text-[11px] uppercase tracking-widest";
                btnRunning.className = "btn-filter tab-inactive px-10 py-2.5 rounded-full text-[11px] uppercase tracking-widest";
                conCompleted.classList.remove('hidden');
                conRunning.classList.add('hidden');
            }
        }

        async function sendReport() {
            const name = document.getElementById('name').value;
            const account = document.getElementById('account').value;
            const quantity = document.getElementById('quantity').value;
            const btn = document.getElementById('btn-send');
            if (!name || !account || !quantity) return alert("Cừu ơi điền đủ giúp mình nha!");
            btn.innerText = "...";
            btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, account, quantity }) });
                document.getElementById('report-box').classList.add('invisible');
                document.getElementById('success-msg').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('report-box').classList.remove('invisible');
                    document.getElementById('success-msg').classList.add('hidden');
                    btn.innerText = "GỬI"; btn.disabled = false;
                }, 2000);
            } catch (e) { alert("Lỗi rồi!"); btn.disabled = false; }
        }
        init();
    </script>
</body>
</html>
