<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTAIN BOY - SOCIAL CHIẾN TÍCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. NỀN GRADIENT BIẾN CHUYỂN XANH - VÀNG */
        body {
            margin: 0;
            padding: 0;
            color: white;
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            /* Tạo dải màu chuyển động mạnh hơn */
            background: linear-gradient(135deg, #050b18, #0a192f, #1e3a8a, #422006, #050b18) !important;
            background-size: 400% 400% !important;
            animation: galaxyMove 15s ease infinite !important;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes galaxyMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. LỚP CANVAS TINH HÀ */
        #galaxy-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Nằm dưới nội dung */
            pointer-events: none;
        }

        /* 3. THIẾT KẾ CARD TRONG SUỐT (GLASSMORPHISM) */
        .galaxy-card {
            background: rgba(16, 25, 45, 0.75);
            border: 1px solid rgba(234, 179, 8, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10; /* Đẩy nội dung lên trên canvas */
        }

        .main-content {
            position: relative;
            z-index: 10;
        }

        input {
            background: rgba(255, 255, 255, 0.07) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px;
            padding: 14px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: #eab308 !important;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(234, 179, 8, 0.6);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Lớp nền sao bay -->
    <canvas id="galaxy-canvas"></canvas>

    <div class="max-w-4xl mx-auto main-content">
        <header class="text-center mb-10">
            <h1 class="text-6xl font-black text-yellow-400 mb-2 italic uppercase tracking-tighter glow-text">
                CAPTAIN BOY
            </h1>
            <p class="text-blue-300 text-[10px] tracking-[0.5em] font-bold mb-8 uppercase">
                ✨ SOCIAL CHIẾN TÍCH ✨
            </p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="galaxy-card p-6">
                    <p class="text-[10px] text-gray-400 uppercase mb-4 font-bold">Số bài tương tác</p>
                    <canvas id="chartPlatforms"></canvas>
                </div>
                <div class="galaxy-card p-6">
                    <p class="text-[10px] text-gray-400 uppercase mb-4 font-bold">Tiến độ CMT</p>
                    <canvas id="chartKPI"></canvas>
                </div>
            </div>
        </header>

        <div class="max-w-2xl mx-auto">
            <div class="galaxy-card p-8 mb-12 border-t-4 border-yellow-500 shadow-2xl text-center">
                <h2 class="text-xl font-black mb-6 uppercase tracking-widest text-yellow-400">🚀 NỘP CHIẾN TÍCH</h2>
                <div id="report-box">
                    <input type="text" id="name" placeholder="Tên Cừu (VD: Cừu Leo Top)">
                    <input type="text" id="account" placeholder="Link hoặc Tên Acc đã cmt">
                    <input type="number" id="quantity" placeholder="Số lượng cmt đã thực hiện">
                    <button onclick="sendReport()" id="btn-send" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl mt-4 uppercase transition-all shadow-lg shadow-yellow-500/20">GỬI CHIẾN TÍCH</button>
                </div>
                <div id="success-msg" class="hidden text-yellow-400 font-bold py-4">✨ ĐÃ GHI NHẬN VÀO VŨ TRỤ! ✨</div>
            </div>

            <div class="flex justify-center gap-2 mb-8 overflow-x-auto pb-2 px-2">
                <button onclick="filter('All')" class="px-5 py-2 rounded-full bg-white/10 border border-white/20 text-xs font-bold hover:bg-white/20">Tất cả</button>
                <button onclick="filter('Facebook')" class="px-5 py-2 rounded-full bg-blue-600 text-xs font-bold shadow-lg shadow-blue-600/30">Facebook</button>
                <button onclick="filter('TikTok')" class="px-5 py-2 rounded-full bg-pink-600 text-xs font-bold">TikTok</button>
                <button onclick="filter('Threads')" class="px-5 py-2 rounded-full bg-black border border-gray-600 text-xs font-bold">Threads</button>
            </div>

            <div id="post-list" class="space-y-8"></div>
        </div>

        <footer class="text-center py-20 mt-10 border-t border-white/10 font-bold opacity-50 text-[10px] tracking-widest">
            @NHUNGCONBOTCUACAPTAINBOY
        </footer>
    </div>

    <script>
        // --- SCRIPT TẠO TINH HÀ (SAO BAY) ---
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initGalaxy() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.8 + 0.2,
                    // Màu sắc sao: vàng nhạt hoặc xanh nhạt
                    color: Math.random() > 0.5 ? '#facc15' : '#60a5fa',
                    opacity: Math.random()
                });
            }
        }

        function drawGalaxy() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Di chuyển sao trôi lên
                p.y -= p.speed;
                if (p.y < -10) p.y = canvas.height + 10;
                
                // Hiệu ứng nhấp nháy
                p.opacity += (Math.random() - 0.5) * 0.05;
                if (p.opacity < 0.1) p.opacity = 0.1;
                if (p.opacity > 1) p.opacity = 1;
            });
            requestAnimationFrame(drawGalaxy);
        }

        window.addEventListener('resize', initGalaxy);
        initGalaxy();
        drawGalaxy();

        // --- DỮ LIỆU VÀ BIỂU ĐỒ (GIỮ NGUYÊN) ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzyWLw1F-pGhjOU_-8kyvIfzOAJWtNYUCLaahwCP07dF41XPur26lzlY_ML1Vopdn9/exec";
        let allPosts = [];
        let chart1, chart2;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                allPosts = data.posts;
                updateCharts(data.stats);
                render(allPosts);
            } catch (e) { 
                document.getElementById('post-list').innerHTML = "Lỗi kết nối Vũ Trụ!"; 
            }
        }

        function updateCharts(stats) {
            const ctx1 = document.getElementById('chartPlatforms').getContext('2d');
            if(chart1) chart1.destroy();
            chart1 = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Facebook', 'TikTok', 'Threads'],
                    datasets: [{
                        data: [stats.fb, stats.tt, stats.th],
                        backgroundColor: ['#2563eb', '#db2777', '#facc15'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: 'white', font: {size: 10} } } } }
            });

            const ctx2 = document.getElementById('chartKPI').getContext('2d');
            if(chart2) chart2.destroy();
            chart2 = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['Kỳ vọng', 'Thực tế'],
                    datasets: [{
                        label: 'Số lượng CMT',
                        data: [stats.expected, stats.actual],
                        backgroundColor: ['#334155', '#eab308'],
                        borderRadius: 10
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'white' } },
                        x: { ticks: { color: 'white' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function render(data) {
            const list = document.getElementById('post-list');
            if(!data || data.length === 0) { list.innerHTML = "<p class='text-center'>Chưa có dữ liệu!</p>"; return; }
            list.innerHTML = data.map(item => `
                <div class="galaxy-card p-6 border-l-4 ${item.status === 'Đang chạy' ? 'border-l-yellow-400' : 'border-l-blue-900'}">
                    <div class="flex justify-between items-center mb-4 uppercase font-bold text-[10px]">
                        <span class="text-blue-400">${item.platform}</span>
                        <span class="${item.status === 'Đang chạy' ? 'text-yellow-400 animate-pulse' : 'text-gray-500'} italic">${item.status}</span>
                    </div>
                    <h3 class="text-2xl font-black mb-2 text-white italic uppercase">${item.goal}</h3>
                    <p class="text-gray-400 text-[10px] mb-6 uppercase tracking-widest font-bold">Key: ${item.keywords}</p>
                    <div class="grid grid-cols-2 gap-3">
                        <a href="${item.link}" target="_blank" class="bg-yellow-500 text-black font-black py-4 rounded-xl text-center text-xs uppercase hover:scale-105 transition-all">CHIẾN NGAY</a>
                        <a href="${item.content}" target="_blank" class="bg-white/10 text-white font-bold py-4 rounded-xl text-center text-xs uppercase border border-white/20">VĂN MẪU</a>
                    </div>
                </div>
            `).join('');
        }

        function filter(p) { render(p === 'All' ? allPosts : allPosts.filter(x => x.platform === p)); }

        async function sendReport() {
            const name = document.getElementById('name').value;
            const account = document.getElementById('account').value;
            const quantity = document.getElementById('quantity').value;
            const btn = document.getElementById('btn-send');
            if(!name || !quantity) return alert("Điền đủ tên và số lượng nhé!");
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, account, quantity }) });
            document.getElementById('report-box').classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
